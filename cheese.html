<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сыр (Качотта)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🧀 Сыр и ингредиенты</h1>
        <nav>
            <a href="index.html">Ввод данных</a>
            <a href="milk.html">Молоко</a>
            <a href="separation.html">Сепарирование</a>
            <a href="cottagecheese.html">Творог</a>
            <a href="cheese.html" class="active">Сыр</a>
            <a href="journal.html">Журнал</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>Параметры сыра (Качотта)</h2>
            
            <div class="form-group">
                <label for="targetFatDM">Желаемый МДЖСВ (%)</label>
                <input type="number" id="targetFatDM" value="45" step="0.1">
                <small>Для качотты обычно 45-50%</small>
            </div>

            <div class="form-group">
                <label for="lossCheese">Потери при созревании (%)</label>
                <input type="number" id="lossCheese" value="0" step="0.1">
            </div>

            <h3>Дозировки (на 1 литр смеси)</h3>
            <div class="form-group">
                <label>Закваска (г/л)</label>
                <input type="number" id="doseStarter" value="0.2" step="0.01">
            </div>
            <div class="form-group">
                <label>Фермент (мл/л)</label>
                <input type="number" id="doseEnzyme" value="0.4" step="0.01">
            </div>
            <div class="form-group">
                <label>Хлористый кальций (г/л)</label>
                <input type="number" id="doseCa" value="0.3" step="0.01">
            </div>

            <button id="calcBtn" class="btn">Рассчитать нормализацию и дозы</button>
            <button id="saveJournalBtn" class="btn btn-success" style="display:none; margin-top:10px;">Сохранить в журнал</button>

            <div id="resultBox" class="result-box"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
