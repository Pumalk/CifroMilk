<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сепарирование</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌀 Сепарирование и сметана</h1>
        <nav>
            <a href="index.html">Ввод данных</a>
            <a href="milk.html">Молоко</a>
            <a href="separation.html" class="active">Сепарирование</a>
            <a href="cottagecheese.html">Творог</a>
            <a href="cheese.html">Сыр</a>
            <a href="journal.html">Журнал</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>Параметры сепарирования</h2>
            
            <div class="form-group">
                <label for="creamFat">Жирность получаемых сливок (%)</label>
                <input type="number" id="creamFat" value="20" step="0.1">
            </div>
            <div class="form-group">
                <label for="creamDen">Плотность сливок (кг/л)</label>
                <input type="number" id="creamDen" value="1.015" step="0.001">
            </div>
            <div class="form-group">
                <label for="skimDen">Плотность обрата (кг/л)</label>
                <input type="number" id="skimDen" value="1.035" step="0.001">
            </div>
            
            <div class="form-group">
                <label class="radio-label" style="border:none; padding-left:0;">
                    <input type="checkbox" id="makeSourCream"> Получить сметану из сливок (20%)
                </label>
            </div>

            <button id="calcBtn" class="btn">Рассчитать</button>
            <button id="saveJournalBtn" class="btn btn-success" style="display:none; margin-top:10px;">Сохранить в журнал</button>

            <div id="resultBox" class="result-box"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
