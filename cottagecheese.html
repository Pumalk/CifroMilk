<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Творог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🧀 Творог (Раздельный метод)</h1>
        <nav>
            <a href="index.html">Ввод данных</a>
            <a href="milk.html">Молоко</a>
            <a href="separation.html">Сепарирование</a>
            <a href="cottagecheese.html" class="active">Творог</a>
            <a href="cheese.html">Сыр</a>
            <a href="journal.html">Журнал</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>Расчёт творога</h2>
            
            <div class="form-group">
                <label for="targetCurdFatSelect">Целевая жирность творога</label>
                <select id="targetCurdFatSelect">
                    <option value="5">5%</option>
                    <option value="9">9%</option>
                    <option value="18">18%</option>
                    <option value="custom">Своя жирность...</option>
                </select>
                <input type="number" id="customCurdFatInput" class="hidden" step="0.1" placeholder="Введите жирность %" style="margin-top: 10px; width:100%;">
            </div>

            <div class="form-group">
                <label for="moisture">Влажность обезжиренного творога (%)</label>
                <input type="number" id="moisture" value="80" step="0.1">
                <small style="color:#777;">Обычно 78-82%</small>
            </div>

            <button id="calcBtn" class="btn">Рассчитать</button>
            <button id="saveJournalBtn" class="btn btn-success" style="display:none; margin-top:10px;">Сохранить в журнал</button>

            <div id="resultBox" class="result-box"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        document.getElementById('targetCurdFatSelect').addEventListener('change', (e) => {
            const input = document.getElementById('customCurdFatInput');
            if (e.target.value === 'custom') input.classList.remove('hidden');
            else input.classList.add('hidden');
        });
    </script>
</body>
</html>
